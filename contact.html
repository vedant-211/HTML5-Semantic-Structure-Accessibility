<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | John Doe Portfolio</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Get in touch with John Doe. Send a message regarding web development opportunities, accessible web design consulting, or collaborations.">
    <meta name="keywords" content="Contact John Doe, Hire Web Developer, Accessible Web Design Consulting, Frontend Developer Contact">
    <meta name="author" content="John Doe">
    <link rel="canonical" href="https://vedant-211.github.io/HTML5-Semantic-Structure-Accessibility/contact.html">
    
    <!-- Open Graph Tags -->
    <meta property="og:title" content="Contact John Doe">
    <meta property="og:description" content="Reach out for web development projects and consulting.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://vedant-211.github.io/HTML5-Semantic-Structure-Accessibility/contact.html">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo" aria-label="John Doe Home">John Doe</a>
            <nav aria-label="Main Navigation">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="contact.html" aria-current="page">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="main-content" class="container">
        <div style="max-width: 600px; margin: 0 auto;">
            <h1 style="text-align: center; margin-bottom: 1rem;">Get in Touch</h1>
            <p style="text-align: center; margin-bottom: 2rem; color: var(--color-text-muted);">Have a question or want to work together? Fill out the form below and I'll get back to you as soon as possible.</p>
            
            <form action="#" method="POST" aria-labelledby="contact-form-heading">
                <!-- Using a visually hidden heading for screen readers to identify the form purpose -->
                <h2 id="contact-form-heading" class="sr-only">Contact Form</h2>
                
                <div class="form-group">
                    <label for="name">Name <span aria-hidden="true">*</span></label>
                    <input type="text" id="name" name="name" required aria-required="true" placeholder="Jane Doe">
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address <span aria-hidden="true">*</span></label>
                    <input type="email" id="email" name="email" required aria-required="true" placeholder="jane.doe@example.com">
                </div>
                
                <div class="form-group">
                    <label for="subject">Subject <span aria-hidden="true">*</span></label>
                    <input type="text" id="subject" name="subject" required aria-required="true" placeholder="Project Inquiry">
                </div>
                
                <div class="form-group">
                    <label for="message">Message <span aria-hidden="true">*</span></label>
                    <textarea id="message" name="message" required aria-required="true" placeholder="How can I help you?"></textarea>
                </div>
                
                <button type="submit" class="btn" style="width: 100%;">Send Message</button>
            </form>
        </div>
    </main>

    <footer>
        <div class="container">
            <nav aria-label="Social Media Links">
                <ul class="social-links">
                    <li><a href="https://github.com/vedant-211" target="_blank" rel="noopener noreferrer" aria-label="GitHub Profile">GitHub</a></li>
                    <li><a href="https://linkedin.com/in/johndoe" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn Profile">LinkedIn</a></li>
                </ul>
            </nav>
            <p>&copy; 2026 John Doe. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
